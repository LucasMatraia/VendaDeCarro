<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>FP Sellection</title>
    <style>
        /* CSS básico para você ver o resultado agora */
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .CarEvolution { position: relative; height: 300px; display: flex; justify-content: center; align-items: center; }
        .CarEvolution img { display: none; width: 450px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .CarEvolution img.active { display: block; }
        nav ul { display: flex; justify-content: center; list-style: none; gap: 20px; padding: 20px; }
        nav a { color: #646cff; text-decoration: none; font-weight: bold; }
        .setas-container { margin-top: 20px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; }
        #SaibaMais button { background-color: #25d366; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <header>
        <img class="logo" src="https://via.placeholder.com/150x50?text=FP+Sellection" alt="Logo">
      
        <nav id="navegador">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">FaleConosco</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Sobre</a></li> 
            </ul>
        </nav>

        <nav id="SaibaMais">
            <p>Para tirar dúvidas, clique no botão saiba mais:
                <button>Saiba Mais</button>
            </p>
        </nav>
    </header>
    
    <main>
        <div class="CarEvolution">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600" class="active" alt="Porsche Cinza">
            <img src="https://images.unsplash.com/photo-1592198084033-aade902d1aae?w=600" alt="Ferrari Vermelha">
            <img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=600" alt="Lamborguini Amarela">
        </div>

        <div class="setas-container">
            <button class="btn-seta arrow-left"> ⬅️ Anterior </button>
            <button class="btn-seta arrow-right"> Próximo ➡️ </button>
        </div>
    </main>

    <script>
        // Selecionando os botões e as imagens
        const btnProximo = document.querySelector('.arrow-right');
        const btnAnterior = document.querySelector('.arrow-left');
        const carros = document.querySelectorAll('.CarEvolution img');
        const btnSaibaMais = document.querySelector('#SaibaMais button');

        let indiceAtivo = 0;

        function trocarCarro(direcao) {
            carros[indiceAtivo].classList.remove('active');

            if (direcao === 'proximo') {
                indiceAtivo++;
                if (indiceAtivo >= carros.length) indiceAtivo = 0;
            } else {
                indiceAtivo--;
                if (indiceAtivo < 0) indiceAtivo = carros.length - 1;
            }

            carros[indiceAtivo].classList.add('active');
        }

        btnProximo.onclick = () => trocarCarro('proximo');
        btnAnterior.onclick = () => trocarCarro('anterior');

        btnSaibaMais.onclick = () => {
            const meuNumero = "5519971446032";
            const texto = "Olá! Gostaria de mais informações sobre os carros da FP Sellection.";
            const url = `https://wa.me/${meuNumero}?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        };

        console.log("Sistema recuperado: " + carros.length + " carros encontrados.");
    </script>
</body>
</html>
